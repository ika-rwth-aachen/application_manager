name: Build and Push Docker Images for Custom Operators

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Find Dockerfiles
        id: find-dockerfiles
        run: |
          DOCKERFILES=$(find custom-operators -name Dockerfile | tr '\n' ' ')
          echo "DOCKERFILES=$DOCKERFILES" >> $GITHUB_ENV

      - name: Build and Push Images
        if: env.DOCKERFILES != ''
        run: |
          for dockerfile in $DOCKERFILES; do
            folder=$(dirname "$dockerfile")
            image_name="ghcr.io/${{ github.repository }}/custom-operator/$(basename "$folder")"
            echo "Building and pushing $image_name"
            docker buildx build \
              --file "$dockerfile" \
              --tag "$image_name:latest" \
              --push \
              "$folder"
          done
