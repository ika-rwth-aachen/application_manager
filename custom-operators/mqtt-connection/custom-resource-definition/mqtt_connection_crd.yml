apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  # <plural>.<group>
  name: mqttconnections.ika.rwth-aachen.de
spec:
  group: ika.rwth-aachen.de
  # list of versions supported by this CustomResourceDefinition
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec: 
              type: object
              properties:
                operator:
                  type: object
                  properties:
                    namespace:
                      type: string 
                      description: Kubernetes namespace
                    requester: 
                      type: array
                      items:
                        type: string
                      description: stores the requesters
                    shutdown:
                      type: boolean
                configCommon:
                  type: object
                  properties:
                    replicaCount:
                      type: integer
                    labelTag:
                      type: string
                    resourceLabels: 
                      type: object
                      additionalProperties:
                        type: string
                    terminationGracePeriodSeconds: 
                      type: integer
                    image: 
                      type: object
                      properties:
                        repository: 
                          type: string
                        tag: 
                          type: string
                    broker:
                      type: object
                      properties:
                        host:
                          type: string
                        port:
                          type: integer
                configSource:
                  type: object
                  properties:
                    name: 
                      type: string
                    commandOverride: 
                      type: array
                      items: 
                        type: string
                    nodeSelector:
                      type: object
                      additionalProperties:
                        type: string
                    configMQTT:
                      type: object
                      x-kubernetes-preserve-unknown-fields: true
                      description: stores the configuration
                configTarget:
                  type: object
                  properties:
                    name: 
                      type: string
                    commandOverride: 
                      type: array
                      items: 
                        type: string
                    nodeSelector:
                      type: object
                      additionalProperties:
                        type: string
                    configMQTT:
                      type: object
                      x-kubernetes-preserve-unknown-fields: true
                      description: stores the configuration
  # either Namespaced or Cluster
  scope: Namespaced
  names:
    plural: mqttconnections
    singular: mqttconnection
    kind: MqttConnection
    shortNames:
    - mqttconn