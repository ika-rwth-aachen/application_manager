apiVersion: v1
kind: PersistentVolume
metadata:
  name: object-detection-operator-pv
  labels:
    tag: am
spec:
  storageClassName: standard
  capacity:
    storage: 10Mi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  hostPath:
    path: /bookkeeping/object-detection
---

apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: object-detection-operator-pvc
  labels:
    tag: am
spec:
  accessModes:
    - ReadWriteOnce
  volumeName: object-detection-operator-pv
  resources:
    requests:
      storage: 10Mi
  storageClassName: standard