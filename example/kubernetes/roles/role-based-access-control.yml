apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: secret-admin
  labels: 
    rbac.application-manager/aggregate_to_application_manager: "true"
    rbac.operator-admin/aggregate_to_operator_admin: "true"
    tag: am
rules:
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

