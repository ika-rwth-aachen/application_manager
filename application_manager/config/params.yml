application_manager:
  ros__parameters:

    # common parameters
    cluster_config: "config/cluster_config.yml"     # either absolute path or relative to the application_manager package
    deployment_action_name: "/event_detector_operator_plugin/operator_plugin/deployment_request"
    namespace: "default"
    k3d_image_registry: "k3d-application-manager-registry.localhost:41671"

    # connection parameters
    connections:

      # Kubernetes nodes running the communication brokers
      communication_broker_nodes:
        - cloud
        - edge

      # Communication broker parameters by Kubernetes node
      communication_broker_params:
        cloud:
          host: service-mqtt-broker-cloud
          port: 1883
        edge:
          host: service-mqtt-broker-edge
          port: 1993